<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechStore | Tu Tienda Pro</title>
    <link rel="stylesheet" href="styles.css"> 
</head>
<body>
    <nav class="navbar">
        <div class="logo">⚡ TechStore</div>
        <ul class="nav-links">
            <li><a href="#" onclick="cargarProductos()">Catálogo</a></li>
        </ul>
        <div style="display: flex; gap: 10px; align-items: center;">
            <button id="btn-login" class="btn-admin-control" onclick="pedirPassword()">Admin Login</button>
            <button id="btn-nuevo-producto" class="btn-carrito" style="display: none; background: #3b82f6;" onclick="abrirModalCrear()">➕ Nuevo</button>
            <button id="btn-logout" class="btn-admin-control" style="display: none; background: #ef4444;" onclick="logoutAdmin()">Salir</button>
            
            <button class="btn-carrito" onclick="toggleCarrito()">🛒 <span id="contador-carrito">0</span></button>
        </div>
    </nav>

    <header class="hero">
        <div class="hero-content">
            <h1>Hardware de Alto Rendimiento</h1>
            <p>Potenciado por Astra DB & IA</p>
        </div>
    </header>

    <main class="contenedor-principal">
        <div id="contenedor-productos" class="grid-productos"></div>
    </main>

    <div id="overlay-carrito" class="overlay" onclick="toggleCarrito()"></div>
    <aside id="sidebar-carrito" class="sidebar">
        <div class="sidebar-header"><h2>Tu Carrito</h2><button class="btn-cerrar" onclick="toggleCarrito()">✖</button></div>
        <div id="items-carrito" class="lista-carrito"></div>
        <div class="sidebar-footer"><h3>Total: $<span id="total-carrito">0</span></h3></div>
    </aside>

    <div id="modal-producto" class="modal">
        <div class="modal-content">
            <span class="btn-cerrar-modal" onclick="cerrarModal()">✖</span>
            <div id="contenido-modal"></div>
        </div>
    </div>

    <div id="modal-crear" class="modal">
        <div class="modal-content" style="max-width: 450px;">
            <span class="btn-cerrar-modal" onclick="cerrarModalCrear()">✖</span>
            <h2 id="titulo-modal-form">Nuevo Producto</h2>
            <form id="form-nuevo-producto" onsubmit="enviarProducto(event)">
                <input type="text" id="input-marca" placeholder="Marca" required style="width: 100%; margin-bottom: 10px; padding: 8px; border-radius: 5px; border: none; background: #334155; color: white;">
                <input type="text" id="input-modelo" placeholder="Modelo" required style="width: 100%; margin-bottom: 10px; padding: 8px; border-radius: 5px; border: none; background: #334155; color: white;">
                
                <div style="display: flex; gap: 10px; margin-bottom: 10px;">
                    <select id="input-categoria" onchange="cambiarCampos()" style="flex: 1; padding: 8px; border-radius: 5px; border: none; background: #334155; color: white;">
                        <option value="Portátiles">Portátiles</option>
                        <option value="Mouses">Mouses</option>
                        <option value="Teclados">Teclados</option>
                        <option value="Monitores">Monitores</option>
                    </select>
                    <input type="number" id="input-precio" placeholder="Precio ($)" step="0.01" required style="flex: 1; padding: 8px; border-radius: 5px; border: none; background: #334155; color: white;">
                </div>

                <input type="text" id="input-imagen" placeholder="URL de Imagen (Opcional)" style="width: 100%; margin-bottom: 10px; padding: 8px; border-radius: 5px; border: none; background: #334155; color: white;">

                <h4 style="margin: 15px 0 10px 0; color: #3b82f6;">Especificaciones Técnicas:</h4>
                <div id="specs-dinamicas" style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px;">
                    </div>

                <button type="submit" class="btn-comprar" style="width: 100%;">Guardar Producto</button>
            </form>
        </div>
    </div>

    <div id="btn-abrir-chat" onclick="toggleChat()">💬 Asesor IA</div>
    <div id="ventana-chat">
        <div id="chat-header"><span>🤖 TechGuide</span><button onclick="toggleChat()" style="background:none; border:none; color:white; cursor:pointer;">✖</button></div>
        <div id="chat-mensajes"><div class="msg-bot">¡Hola! Soy TechGuide. ¿En qué te puedo asesorar hoy?</div></div>
        <div id="chat-input-area">
            <input type="text" id="chat-input" placeholder="Escribe tu mensaje..." onkeypress="if(event.key === 'Enter') enviarChat()">
            <button onclick="enviarChat()">Enviar</button>
        </div>
    </div>

    <script src="app.js"></script> 
</body>
</html>
